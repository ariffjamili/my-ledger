<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset password — MyLedger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase.js" defer></script>
    <script src="/assets/js/utils.js" defer></script>
    <script src="/assets/js/auth.js" defer></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <main class="flex min-h-screen items-center justify-center p-6">
      <section class="w-full max-w-sm rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-xl font-semibold">Reset your password</h1>
        <p class="mt-1 text-sm text-slate-500">Enter a new password for your account.</p>

        <form id="reset-form" class="mt-4 space-y-3" novalidate>
          <div>
            <label for="new-password" class="block text-sm font-medium">New password</label>
            <input id="new-password" type="password" autocomplete="new-password" required minlength="8"
                   class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500" />
            <p class="mt-1 text-xs text-slate-500">Minimum 8 characters.</p>
          </div>
          <div>
            <label for="confirm-password" class="block text-sm font-medium">Confirm new password</label>
            <input id="confirm-password" type="password" autocomplete="new-password" required minlength="8"
                   class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500" />
          </div>
          <button type="submit"
                  class="w-full rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800 disabled:opacity-50">
            Update password
          </button>
        </form>

        <p class="mt-4 text-center text-sm">
          <a href="/login" class="text-slate-600 hover:underline">Back to log in</a>
        </p>
      </section>
    </main>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('reset-form');

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const submit = form.querySelector('button[type="submit"]');
          const newPassword = document.getElementById('new-password').value;
          const confirm = document.getElementById('confirm-password').value;

          if (newPassword !== confirm) {
            window.utils.toast('Passwords do not match', 'error');
            return;
          }
          if (newPassword.length < 8) {
            window.utils.toast('Password must be at least 8 characters', 'error');
            return;
          }

          submit.disabled = true;
          try {
            await window.auth.updatePassword(newPassword);
            window.utils.toast('Password updated. Please log in.', 'success');
            await window.auth.signOut();
          } catch (err) {
            console.error(err);
            const msg = err.message || 'Could not update password';
            window.utils.toast(
              msg.includes('Auth session missing')
                ? 'Reset link expired. Request a new one from /login.'
                : msg,
              'error'
            );
            submit.disabled = false;
          }
        });
      });
    </script>
  </body>
</html>

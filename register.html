<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account — MyLedger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/assets/js/supabase.js" defer></script>
    <script src="/assets/js/utils.js" defer></script>
    <script src="/assets/js/auth.js" defer></script>
  </head>
  <body class="bg-slate-50 text-slate-900" data-auth="guest-only">
    <main class="flex min-h-screen items-center justify-center p-6">
      <section class="w-full max-w-sm rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-xl font-semibold">Create your MyLedger account</h1>

        <form id="register-form" class="mt-4 space-y-3" novalidate>
          <div>
            <label for="reg-email" class="block text-sm font-medium">Email</label>
            <input id="reg-email" type="email" autocomplete="email" required
                   class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500" />
          </div>
          <div>
            <label for="reg-password" class="block text-sm font-medium">Password</label>
            <input id="reg-password" type="password" autocomplete="new-password" required minlength="8"
                   class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500" />
            <p class="mt-1 text-xs text-slate-500">Minimum 8 characters.</p>
          </div>
          <div>
            <label for="reg-confirm" class="block text-sm font-medium">Confirm password</label>
            <input id="reg-confirm" type="password" autocomplete="new-password" required minlength="8"
                   class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-slate-500 focus:outline-none focus:ring-1 focus:ring-slate-500" />
          </div>
          <button type="submit"
                  class="w-full rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800 disabled:opacity-50">
            Create account
          </button>
        </form>

        <div id="register-success" class="mt-4 hidden rounded-md border border-emerald-200 bg-emerald-50 p-4 text-sm text-emerald-800">
          <p class="font-medium">Check your email</p>
          <p class="mt-1">We've sent a confirmation link to <span data-slot="email" class="font-medium"></span>. Click it to activate your account, then log in.</p>
        </div>

        <p class="mt-4 text-center text-sm">
          Already have an account?
          <a href="/login" class="text-slate-600 hover:underline">Log in</a>
        </p>
      </section>
    </main>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('register-form');
        const success = document.getElementById('register-success');

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const submit = form.querySelector('button[type="submit"]');
          const email = document.getElementById('reg-email').value.trim();
          const password = document.getElementById('reg-password').value;
          const confirm = document.getElementById('reg-confirm').value;

          if (password !== confirm) {
            window.utils.toast('Passwords do not match', 'error');
            return;
          }
          if (password.length < 8) {
            window.utils.toast('Password must be at least 8 characters', 'error');
            return;
          }

          submit.disabled = true;
          try {
            await window.auth.signUp(email, password);
            success.querySelector('[data-slot="email"]').textContent = email;
            form.classList.add('hidden');
            success.classList.remove('hidden');
          } catch (err) {
            console.error(err);
            window.utils.toast(err.message || 'Sign-up failed', 'error');
            submit.disabled = false;
          }
        });
      });
    </script>
  </body>
</html>
